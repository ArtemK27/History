const listContainer = document.getElementById('list');
const input = document.getElementById('searchBox');

// Отрисовка
function renderList() {
  data.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<div class="question">${item[0]}</div><div class="answer">${item[1]}</div>`;
    listContainer.appendChild(div);
  });
}

// Поиск
function doFilter() {
  const filter = input.value.toLowerCase().replace(/ё/g, 'е');
  const items = document.getElementsByClassName('item');
  
  for (let i = 0; i < items.length; i++) {
    const qDiv = items[i].getElementsByClassName('question')[0];
    if (qDiv) {
      const qText = qDiv.innerText.toLowerCase().replace(/ё/g, 'е');
      if (qText.indexOf(filter) > -1) {
        items[i].classList.remove('hidden');
      } else {
        items[i].classList.add('hidden');
      }
    }
  }
}

// Запуск
document.addEventListener('DOMContentLoaded', renderList);
input.addEventListener('input', doFilter);
input.addEventListener('keyup', doFilter);
